<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Groq Chatbot</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">⚡</span>
          <span class="logo-text">GroqChat</span>
        </div>
        <p class="sidebar-tagline">Powered by Llama 3.3 · 70B</p>
      </div>

      <button class="new-chat-btn" id="clearBtn">
        <span>＋</span> New Chat
      </button>

      <div class="sidebar-footer">
        <div class="model-badge">
          <span class="badge-dot"></span>
          <span id="modelLabel">llama-3.3-70b-versatile</span>
        </div>
        <p class="token-info">Tokens used: <strong id="tokenCount">0</strong></p>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="chat-main">
      <div class="chat-window" id="chatWindow">

        <!-- Welcome state -->
        <div class="welcome-state" id="welcomeState">
          <div class="welcome-icon">⚡</div>
          <h1>How can I help you today?</h1>
          <p>Ask me anything — I'm running on Groq's blazing-fast inference.</p>
          <div class="starter-chips">
            <button class="chip" onclick="useStarter(this)">Explain quantum computing simply</button>
            <button class="chip" onclick="useStarter(this)">Write a Python function to sort a dict</button>
            <button class="chip" onclick="useStarter(this)">What's the difference between REST and GraphQL?</button>
            <button class="chip" onclick="useStarter(this)">Give me 5 productivity tips for developers</button>
          </div>
        </div>

      </div>

      <!-- Input bar -->
      <div class="input-bar">
        <div class="input-wrapper">
          <textarea
            id="userInput"
            placeholder="Message GroqChat..."
            rows="1"
            autocomplete="off"
          ></textarea>
          <button class="send-btn" id="sendBtn" title="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
      </div>
    </main>

  </div>

  <script src="/static/js/chat.js"></script>
</body>
</html>
